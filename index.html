<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SereniLuxe Spa & Belleza | Torreón Coahuila</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --beige: #f8f1e9;
            --gold: #d4af88;
            --dark: #3a2f2f;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Playfair Display', serif;
            background-color: var(--beige);
            color: var(--dark);
            line-height: 1.6;
            font-size: 16px;
        }

        header {
            background: rgba(248, 241, 233, 0.98);
            backdrop-filter: blur(10px);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            box-shadow: 0 2px 15px rgba(0,0,0,0.1);
        }
        
        nav {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo img { height: 50px; }
        .hamburger { 
            display: block; 
            font-size: 1.8rem; 
            cursor: pointer; 
            padding: 5px;
        }

        .nav-links { 
            display: none; 
            position: absolute; 
            top: 100%; 
            left: 0; 
            width: 100%; 
            background: rgba(248, 241, 233, 0.98); 
            flex-direction: column; 
            padding: 1rem; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .nav-links.active { display: flex; }

        .hero {
            min-height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), 
                        url('https://images.unsplash.com/photo-1600335895229-0e8d0d7f5e3c?ixlib=rb-4.0.3&auto=format&fit=crop&q=80') center/cover;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: white;
            padding-top: 80px;
        }

        .btn {
            padding: 14px 32px;
            border-radius: 50px;
            font-weight: bold;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s;
            font-size: 1.1rem;
        }
        
        .btn-gold { background: var(--gold); color: white; }
        .btn-whatsapp { background: #25D366; color: white; }

        section { 
            padding: 70px 5%; 
            max-width: 1200px; 
            margin: 0 auto; 
        }
        h2 { 
            text-align: center; 
            font-size: clamp(2rem, 7vw, 2.8rem); 
            margin-bottom: 2.5rem; 
        }

        /* Categorías */
        .categories-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 1.5rem;
        }

        .category-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 5px 20px rgba(0,0,0,0.08);
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .category-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.15);
        }

        .category-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .category-info {
            padding: 1.2rem;
            text-align: center;
        }

        /* Tratamientos */
        .treatments-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
        }

        .treatment-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 5px 20px rgba(0,0,0,0.08);
        }

        .treatment-card img {
            width: 100%;
            height: 210px;
            object-fit: cover;
        }

        .treatment-info {
            padding: 1.3rem;
            text-align: center;
        }

        .treatment-info h4 {
            margin-bottom: 8px;
            font-size: 1.25rem;
        }

        .add-to-cart {
            width: 100%;
            padding: 14px;
            background: var(--gold);
            color: white;
            border: none;
            border-radius: 50px;
            margin-top: 12px;
            cursor: pointer;
            font-size: 1.05rem;
            font-weight: bold;
        }

        .quantity-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-top: 10px;
        }

        .quantity-btn {
            width: 38px;
            height: 38px;
            border: 2px solid var(--gold);
            background: white;
            color: var(--gold);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            font-weight: bold;
            cursor: pointer;
            user-select: none;
        }

        /* Selected Services */
        #selected-services {
            margin-top: 3rem;
            background: white;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .selected-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 0;
            border-bottom: 1px solid #eee;
        }

        input, textarea {
            width: 100%;
            padding: 14px;
            margin-bottom: 1rem;
            border: 1px solid #ddd;
            border-radius: 12px;
            font-size: 1.05rem;
        }

        /* Responsive */
        @media (max-width: 480px) {
            section { padding: 60px 5%; }
            .treatment-card img { height: 180px; }
            .btn { padding: 13px 28px; font-size: 1rem; }
        }
    </style>
</head>
<body>

    <!-- HEADER -->
    <header>
        <nav>
            <div class="logo">
                <img src="logo.png" alt="SereniLuxe">
                <div>
                    <h2 style="font-size: 1.6rem; margin:0;">SERENILUXE</h2>
                    <p style="font-size: 0.8rem; color: #d4af88; margin:0;">SPA & BELLEZA</p>
                </div>
            </div>
            
            <ul class="nav-links" id="navLinks">
                <li><a href="#inicio">Inicio</a></li>
                <li><a href="#servicios">Servicios</a></li>
            </ul>
            
            <div style="display:flex; gap:10px; align-items:center;">
                <a href="https://wa.me/528714122593" target="_blank" class="btn btn-whatsapp" style="padding:10px 14px;">
                    <i class="fab fa-whatsapp"></i>
                </a>
                <div class="hamburger" id="hamburger">☰</div>
            </div>
        </nav>
    </header>

    <!-- HERO -->
    <section id="inicio" class="hero">
        <div style="text-align:center; max-width:700px; padding:2rem 5%;">
            <img src="logo.png" alt="SereniLuxe" style="height:100px; margin-bottom:1.5rem;">
            <h1 style="font-size: clamp(2.2rem, 8vw, 3rem);">Tu bienestar,<br>nuestra esencia.</h1>
            <p style="font-size: 1.1rem; margin:1rem 0;">Relájate, desconecta y déjate consentir.</p>
            
            <a href="#servicios" class="btn btn-gold">Ver Servicios</a>
            <a href="https://won.cards/K6O" target="_blank" class="btn btn-gold" style="margin-top: 15px;">
                <i class="fas fa-id-card"></i> Tarjeta de Fidelidad
            </a>
        </div>
    </section>

    <!-- SERVICIOS -->
    <section id="servicios">
        <h2>Nuestros Servicios</h2>
        
        <div class="categories-grid" id="categoriesGrid"></div>

        <!-- Tratamientos -->
        <div id="treatmentsSection" style="display: none;">
            <h3 id="categoryTitle" style="text-align:center; margin: 2.5rem 0 2rem; font-size: 1.8rem;"></h3>
            <div class="treatments-grid" id="treatmentsGrid"></div>
            
            <button onclick="backToCategories()" class="btn btn-gold" style="margin: 2rem auto; display:block;">
                ← Volver a Categorías
            </button>
        </div>

        <!-- Servicios Seleccionados -->
        <div id="selected-services" style="display:none;">
            <h3>Servicios Seleccionados</h3>
            <div id="selected-list"></div>

            <div class="booking-fields" style="margin-top: 2.5rem;">
                <h3>Completa tus datos</h3>
                <input type="text" id="nombre" placeholder="Nombre completo" required>
                <input type="date" id="fecha" required>
                <input type="time" id="hora" required>
                <textarea id="mensaje" rows="3" placeholder="Comentarios adicionales (opcional)"></textarea>
            </div>

            <button onclick="sendToWhatsApp()" class="btn btn-gold" style="width:100%; margin-top:1.5rem; padding:16px; font-size:1.2rem;">
                <i class="fab fa-whatsapp"></i> Confirmar Cita por WhatsApp
            </button>
        </div>
    </section>

    <footer style="background:var(--dark); color:#f8f1e9; text-align:center; padding:3rem 5%;">
        <img src="logo.png" alt="SereniLuxe" style="height:70px; margin-bottom:1rem;">
        <p><strong>SERENILUXE SPA & BELLEZA</strong></p>
        <p>Torreón, Coahuila</p>
    </footer>

    <script>
        const categories = [
            {
                id: 1,
                name: "Faciales",
                image: "faciales.png",
                treatments: [
                    { id: 101, name: "Facial sencillo", price: "$900", duration: "50 min", description: "txt" },
                    { id: 102, name: "Facial con mixologia", price: "$1,100", duration: "70 min", description: "txt" },
                    { id: 103, name: "dermaplaning", price: "$1,000", duration: "75 min", description: "txt" }
                ]
            },
            {
                id: 2,
                name: "Masajes",
                image: "masajes.png",
                treatments: [
                    { id: 201, name: "Masaje Relajante", price: "$1,100", duration: "90 min", description: "txt" },
                    { id: 202, name: "Masaje linfatico manual", price: "$950", duration: "60 min", description: "txt" }
                ]
            },
            {
                id: 3,
                name: "Maquillaje",
                image: "maquillaje.png",
                treatments: [
                    { id: 301, name: "Maquillaje Social", price: "$800", duration: "45 min", description: "txt" },
                    { id: 302, name: "Maquillaje nupcial", price: "$3,000", duration: "120 min", description: "txt" },
                    { id: 303, name: "Maquillaje xv", price: "$2,500", duration: "120 min", description: "txt" }
                ]
            },
            {
                id: 4,
                name: "Plus Head Spa",
                image: "plusheadspa.png",
                treatments: [
                    { id: 401, name: "Head Spa Básico", price: "$800", duration: "45 min", description: "txt" },
                    { id: 402, name: "Head Spa + masaje relajante/drenaje linfatico", price: "$1,500", duration: "90 min", description: "Txt" }
                ]
            },
            {
                id: 5,
                name: "Peinado",
                image: "peinado.png",
                treatments: [
                    { id: 501, name: "Pistoleado", price: "$400", duration: "40 min", description: "txt" },
                    { id: 502, name: "ondas", price: "$350", duration: "80 min", description: "txt" },
                    { id: 503, name: "Planchado", price: "$350", duration: "50 min", description: "txt" },
                    { id: 504, name: "Recogido", price: "$800", duration: "55 min", description: "txt" },
                    { id: 505, name: "Peinado Sencillo", price: "$500", duration: "55 min", description: "txt" }
                ]
            },
            {
                id: 6,
                name: "Uñas",
                image: "unas.png",
                treatments: [
                    { id: 601, name: "Rubber", price: "$350", duration: "40 min", description: "txt" },
                    { id: 602, name: "Diseño extra", price: "$50", duration: "20 min", description: "dieseño" },
                    { id: 603, name: "Gelish", price: "$250", duration: "55 min", description: "Tratamiento completo" },
                    { id: 604, name: "Uñas Acrílicas", price: "$500", duration: "120 min", description: "Uñas largas con acrílico" }
                ]
            }
        ];

        let selectedServices = [];

        function renderCategories() {
            const container = document.getElementById('categoriesGrid');
            container.innerHTML = '';

            categories.forEach(cat => {
                const card = document.createElement('div');
                card.className = 'category-card';
                card.innerHTML = `
                    <img src="${cat.image}" alt="${cat.name}">
                    <div class="category-info">
                        <h3>${cat.name}</h3>
                        <p>${cat.treatments.length} tratamientos</p>
                    </div>
                `;
                card.onclick = () => showTreatments(cat);
                container.appendChild(card);
            });
        }

        function showTreatments(category) {
            document.getElementById('categoriesGrid').style.display = 'none';
            document.getElementById('treatmentsSection').style.display = 'block';
            document.getElementById('categoryTitle').textContent = category.name;

            const grid = document.getElementById('treatmentsGrid');
            grid.innerHTML = '';

            category.treatments.forEach(t => {
                const card = document.createElement('div');
                card.className = 'treatment-card';
                card.innerHTML = `
                    <img src="${category.image}" alt="${t.name}">
                    <div class="treatment-info">
                        <h4>${t.name}</h4>
                        <p>${t.description || ''}</p>
                        <strong>${t.price} • ${t.duration}</strong>
                        
                        <button class="add-to-cart" onclick="addToCart(${category.id}, ${t.id})">
                            <i class="fas fa-cart-plus"></i> Agregar al carrito
                        </button>
                        
                        <div class="quantity-controls" id="qty-${t.id}" style="display:none;">
                            <div class="quantity-btn" onclick="changeQuantity(${t.id}, -1)">−</div>
                            <span id="count-${t.id}" style="font-size:1.2rem; min-width:30px;">1</span>
                            <div class="quantity-btn" onclick="changeQuantity(${t.id}, 1)">+</div>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function backToCategories() {
            document.getElementById('treatmentsSection').style.display = 'none';
            document.getElementById('categoriesGrid').style.display = 'grid';
        }

        function addToCart(catId, treatId) {
            const category = categories.find(c => c.id === catId);
            const treatment = category.treatments.find(t => t.id === treatId);

            const existing = selectedServices.find(item => item.treatment.id === treatId);

            if (existing) {
                existing.quantity++;
            } else {
                selectedServices.push({ treatment, quantity: 1 });
            }

            updateSelectedServices();
            document.getElementById(`qty-${treatId}`).style.display = 'flex';
        }

        function changeQuantity(treatId, change) {
            const item = selectedServices.find(i => i.treatment.id === treatId);
            if (!item) return;

            item.quantity += change;
            if (item.quantity < 1) {
                selectedServices = selectedServices.filter(i => i.treatment.id !== treatId);
            }

            updateSelectedServices();
        }

        function updateSelectedServices() {
            const container = document.getElementById('selected-services');
            const list = document.getElementById('selected-list');
            list.innerHTML = '';

            if (selectedServices.length === 0) {
                container.style.display = 'none';
                return;
            }

            container.style.display = 'block';

            selectedServices.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = 'selected-item';
                div.innerHTML = `
                    <div>
                        <strong>${item.treatment.name}</strong><br>
                        <small>${item.treatment.price} × ${item.quantity}</small>
                    </div>
                    <div style="display:flex; align-items:center; gap:12px;">
                        <div class="quantity-btn" onclick="changeQuantity(${item.treatment.id}, -1)">−</div>
                        <span style="font-weight:bold; min-width:25px; text-align:center;">${item.quantity}</span>
                        <div class="quantity-btn" onclick="changeQuantity(${item.treatment.id}, 1)">+</div>
                        <span onclick="removeService(${index})" style="color:red; font-size:1.6rem; cursor:pointer; margin-left:10px;">×</span>
                    </div>
                `;
                list.appendChild(div);
            });
        }

        function removeService(index) {
            selectedServices.splice(index, 1);
            updateSelectedServices();
        }

        function sendToWhatsApp() {
            const nombre = document.getElementById('nombre').value.trim();
            const fecha = document.getElementById('fecha').value;
            const hora = document.getElementById('hora').value;
            const mensajeExtra = document.getElementById('mensaje').value.trim();

            if (!nombre || !fecha || !hora) {
                alert("Por favor completa tu nombre, fecha y hora.");
                return;
            }

            let mensaje = `Hola SereniLuxe, quiero agendar una cita a nombre de *${nombre}*.\n\n`;
            mensaje += `📅 Fecha: ${fecha}\n`;
            mensaje += `⏰ Hora: ${hora}\n\n`;
            mensaje += `Servicios:\n`;
            
            selectedServices.forEach(s => {
                mensaje += `• ${s.treatment.name} ×${s.quantity} - ${s.treatment.price}\n`;
            });
            
            if (mensajeExtra) mensaje += `\nComentarios: ${mensajeExtra}`;

            window.open(`https://wa.me/528714122593?text=${encodeURIComponent(mensaje)}`, '_blank');
        }

        // Hamburger Menu
        document.getElementById('hamburger').addEventListener('click', () => {
            document.getElementById('navLinks').classList.toggle('active');
        });

        // Inicializar
        window.onload = () => {
            renderCategories();
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('fecha').setAttribute('min', today);
        };
    </script>
</body>
</html>
