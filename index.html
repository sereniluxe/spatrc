<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SereniLuxe Spa & Belleza | Torreón Coahuila</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --beige: #f8f1e9;
            --gold: #d4af88;
            --dark: #3a2f2f;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Playfair Display', serif;
            background-color: var(--beige);
            color: var(--dark);
            line-height: 1.6;
        }

        header {
            background: rgba(248, 241, 233, 0.98);
            backdrop-filter: blur(10px);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            box-shadow: 0 2px 15px rgba(0,0,0,0.1);
        }
        
        nav {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo img { height: 55px; }
        .hamburger { display: none; font-size: 1.8rem; cursor: pointer; }

        .hero {
            min-height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('https://images.unsplash.com/photo-1600335895229-0e8d0d7f5e3c?ixlib=rb-4.0.3&auto=format&fit=crop&q=80') center/cover;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: white;
            padding-top: 80px;
        }

        .btn {
            padding: 14px 32px;
            border-radius: 50px;
            font-weight: bold;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s;
        }
        
        .btn-gold { background: var(--gold); color: white; }
        .btn-whatsapp { background: #25D366; color: white; }

        section { padding: 80px 5%; max-width: 1200px; margin: 0 auto; }
        h2 { text-align: center; font-size: clamp(2rem, 6vw, 2.8rem); margin-bottom: 3rem; }

        /* Servicios */
        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
        }
        
        .service-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 5px 20px rgba(0,0,0,0.08);
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .service-card:hover {
            transform: translateY(-12px);
            box-shadow: 0 20px 35px rgba(0,0,0,0.15);
        }
        
        .service-card img {
            width: 100%;
            height: 220px;
            object-fit: cover;
        }
        
        .service-info { padding: 1.5rem; text-align: center; }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }
        
        .modal-content {
            background: white;
            max-width: 500px;
            width: 90%;
            border-radius: 20px;
            overflow: hidden;
        }
        
        .modal-content img {
            width: 100%;
            height: 280px;
            object-fit: cover;
        }
        
        .modal-body { padding: 1.8rem; }
        .price-duration {
            display: flex;
            justify-content: space-between;
            margin: 1.2rem 0;
            padding: 1rem;
            background: #f8f1e9;
            border-radius: 12px;
        }
        
        .add-btn {
            width: 100%;
            padding: 14px;
            background: var(--gold);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 1.1rem;
            cursor: pointer;
        }

        /* Servicios Seleccionados - MEJORADO */
        #selected-services {
            margin-top: 4rem;
            background: white;
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        
        .selected-item {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #eee;
        }

        .booking-fields {
            margin-top: 2rem;
            padding-top: 2rem;
            border-top: 2px solid #f0e6d9;
        }
        
        input, textarea {
            width: 100%;
            padding: 14px;
            margin-bottom: 1rem;
            border: 1px solid #ddd;
            border-radius: 12px;
            font-size: 1.05rem;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .hamburger { display: block; }
            .nav-links { 
                display: none; 
                position: absolute; 
                top: 100%; 
                left: 0; 
                width: 100%; 
                background: rgba(248, 241, 233, 0.98); 
                flex-direction: column; 
                padding: 1rem; 
            }
            .nav-links.active { display: flex; }
        }
    </style>
</head>
<body>

    <!-- HEADER -->
    <header>
        <nav>
            <div class="logo">
                <img src="logo.png" alt="SereniLuxe">
                <div>
                    <h2 style="font-size: 1.7rem; margin:0;">SERENILUXE</h2>
                    <p style="font-size: 0.85rem; color: #d4af88; margin:0;">SPA & BELLEZA</p>
                </div>
            </div>
            
            <ul class="nav-links" id="navLinks">
                <li><a href="#inicio">Inicio</a></li>
                <li><a href="#servicios">Servicios</a></li>
            </ul>
            
            <div style="display:flex; gap:10px; align-items:center;">
                <a href="https://wa.me/528714122593" target="_blank" class="btn btn-whatsapp">
                    <i class="fab fa-whatsapp"></i>
                </a>
                <div class="hamburger" id="hamburger">☰</div>
            </div>
        </nav>
    </header>

    <!-- giro -->
    <section id="inicio" class="hero">
        <div style="text-align:center; max-width:700px; padding:2rem 5%;">
            <img src="logo.png" alt="SereniLuxe" style="height:110px; margin-bottom:1.5rem;">
            <h1>Tu bienestar,<br>nuestra esencia.</h1>
            <p>Relájate, desconecta y déjate consentir.</p>
            <a href="#servicios" class="btn btn-gold">Ver Servicios</a>
        </div>
    </section>

    <!-- SERVICIOS -->
    <section id="servicios">
        <h2>Nuestros Servicios</h2>
        <div class="services-grid" id="servicesGrid"></div>

        <!-- PANEL DE RESERVACIÓN -->
        <div id="selected-services" style="display:none;">
            <h3>Servicios Seleccionados</h3>
            <div id="selected-list"></div>

            <div class="booking-fields">
                <h3>Completa tus datos</h3>
                <input type="text" id="nombre" placeholder="Nombre completo" required>
                <input type="date" id="fecha" required>
                <input type="time" id="hora" required>
                <textarea id="mensaje" rows="3" placeholder="Comentarios adicionales (opcional)"></textarea>
            </div>

            <button onclick="sendToWhatsApp()" class="btn btn-gold" style="width:100%; margin-top:1.5rem; padding:16px; font-size:1.2rem;">
                <i class="fab fa-whatsapp"></i> Confirmar Cita por WhatsApp
            </button>
        </div>
    </section>

    <!-- MODAL -->
    <div class="modal" id="serviceModal">
        <div class="modal-content">
            <img id="modalImage" src="" alt="">
            <div class="modal-body">
                <h2 id="modalTitle"></h2>
                <p id="modalDescription"></p>
                
                <div class="price-duration">
                    <div><strong>Precio:</strong> <span id="modalPrice"></span></div>
                    <div><strong>Duración:</strong> <span id="modalDuration"></span></div>
                </div>
                
                <button class="add-btn" onclick="addCurrentService()">
                    <i class="fas fa-plus"></i> Añadir este servicio
                </button>
                <button onclick="closeModal()" style="margin-top:10px; width:100%; padding:12px; background:none; border:1px solid #ccc; border-radius:50px;">
                    Cerrar
                </button>
            </div>
        </div>
    </div>

    <footer style="background:var(--dark); color:#f8f1e9; text-align:center; padding:3rem 5%;">
        <img src="logo.png" alt="SereniLuxe" style="height:70px; margin-bottom:1rem;">
        <p><strong>SERENILUXE SPA & BELLEZA</strong></p>
        <p>Torreón, Coahuila </p>
    </footer>

    <script>
        const services = [
            { id: 1, name: "Faciales", image: "faciales.png", description: "Tratamiento facial", price: "$850", duration: "60 minutos" },
            { id: 2, name: "Masajes ", image: "masajes.png", description: "Masaje", price: "$950", duration: "60 minutos" },
            { id: 3, name: "Maquillaje Profesional", image: "maquillaje.png", description: "Maquiyaje", price: "$650", duration: "45 minutos" },
            { id: 4, name: "Plus Head Spa", image: "plusheadspa.png", description: "Txt", price: "$1,200", duration: "75 minutos" },
            { id: 5, name: "Peinado", image: "peinado.png", description: "Peinados", price: "$550", duration: "40 minutos" }
        ];

        let selectedServices = [];

        function renderServices() {
            const container = document.getElementById('servicesGrid');
            container.innerHTML = '';
            
            services.forEach(service => {
                const card = document.createElement('div');
                card.className = 'service-card';
                card.innerHTML = `
                    <img src="${service.image}" alt="${service.name}">
                    <div class="service-info">
                        <h3>${service.name}</h3>
                        <p>${service.description.substring(0, 85)}...</p>
                    </div>
                `;
                card.onclick = () => showModal(service);
                container.appendChild(card);
            });
        }

        let currentService = null;
        
        function showModal(service) {
            currentService = service;
            document.getElementById('modalImage').src = service.image;
            document.getElementById('modalTitle').textContent = service.name;
            document.getElementById('modalDescription').textContent = service.description;
            document.getElementById('modalPrice').textContent = service.price;
            document.getElementById('modalDuration').textContent = service.duration;
            document.getElementById('serviceModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('serviceModal').style.display = 'none';
        }

        function addCurrentService() {
            if (!currentService) return;
            selectedServices.push(currentService);
            updateSelectedServices();
            closeModal();
        }

        function updateSelectedServices() {
            const container = document.getElementById('selected-services');
            const list = document.getElementById('selected-list');
            list.innerHTML = '';
            
            if (selectedServices.length === 0) {
                container.style.display = 'none';
                return;
            }
            
            container.style.display = 'block';
            
            selectedServices.forEach((service, index) => {
                const div = document.createElement('div');
                div.className = 'selected-item';
                div.innerHTML = `
                    <span>${service.name} — ${service.price}</span>
                    <span onclick="removeService(${index})" style="color:red; cursor:pointer; font-size:1.4rem;">×</span>
                `;
                list.appendChild(div);
            });
        }

        function removeService(index) {
            selectedServices.splice(index, 1);
            updateSelectedServices();
        }

        function sendToWhatsApp() {
            const nombre = document.getElementById('nombre').value.trim();
            const fecha = document.getElementById('fecha').value;
            const hora = document.getElementById('hora').value;
            const mensajeExtra = document.getElementById('mensaje').value.trim();

            if (!nombre || !fecha || !hora) {
                alert("Por favor completa tu nombre, fecha y hora.");
                return;
            }

            let mensaje = `Hola SereniLuxe, quiero agendar una cita a nombre de *${nombre}*.\n\n`;
            mensaje += `📅 Fecha: ${fecha}\n`;
            mensaje += `⏰ Hora: ${hora}\n\n`;
            mensaje += `Servicios solicitados:\n`;
            
            selectedServices.forEach(s => {
                mensaje += `• ${s.name} - ${s.price} (${s.duration})\n`;
            });
            
            if (mensajeExtra) mensaje += `\nComentarios: ${mensajeExtra}`;

            const encoded = encodeURIComponent(mensaje);
            window.open(`https://wa.me/528714122593?text=${encoded}`, '_blank');
        }

        // carrito
        document.getElementById('hamburger').addEventListener('click', () => {
            document.getElementById('navLinks').classList.toggle('active');
        });

        // Inicializar página
        window.onload = () => {
            renderServices();
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('fecha').setAttribute('min', today);
        };
    </script>
</body>
</html>
